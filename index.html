<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냥이의 철강 무게 계산기</title>
  
  <!-- 냥이의 요술 지팡이들이다냥! (설치 없이 인터넷에서 부품을 빌려온다냥) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
  <!-- 계산기가 뿅! 하고 나타날 자리다냥 -->
  <div id="root"></div>

  <!-- 여기서부터 진짜 계산기 마법 코드다냥! -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // 재질과 형상 상태 관리다냥!
      const [material, setMaterial] = useState('ss400');
      const [shape, setShape] = useState('plate');

      // 치수 상태 관리다냥! (단위: mm)
      const [dimensions, setDimensions] = useState({
        A: 50,    
        B: 50,    
        H: 100,   
        W: 1000,  
        t1: 1.6,  
        t2: 7,    
        L: 2000   
      });

      // 결과 무게 (kg) 다냥!
      const [weight, setWeight] = useState(0);

      // 단가 (KG당 금액) 상태 추가다냥!
      const [pricePerKg, setPricePerKg] = useState(0);

      // 장바구니 리스트다냥!
      const [items, setItems] = useState([]);

      // 비중이다냥
      const densities = {
        ss400: 7.85,
        sus304: 7.93
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setDimensions(prev => ({
          ...prev,
          [name]: parseFloat(value) || 0 
        }));
      };

      const handleAddItem = () => {
        if (weight <= 0) return;
        
        let dimText = '';
        if (shape === 'angle') dimText = `A:${dimensions.A}, B:${dimensions.B}, t:${dimensions.t1}, L:${dimensions.L}`;
        else if (shape === 'hbeam' || shape === 'channel') dimText = `H:${dimensions.H}, B:${dimensions.W}, t1:${dimensions.t1}, t2:${dimensions.t2}, L:${dimensions.L}`;
        else if (shape === 'plate') dimText = `W:${dimensions.W}, t:${dimensions.t1}, L:${dimensions.L}`;

        const itemPrice = weight * pricePerKg; // 무게 * 단가 = 가격 계산이다냥!

        const newItem = {
          id: Date.now(),
          material: material === 'ss400' ? 'SS400' : 'SUS304',
          shapeName: shape === 'angle' ? '앵글' : shape === 'hbeam' ? 'H빔' : shape === 'channel' ? '잔넬' : '판재',
          dimText: dimText,
          weight: weight,
          pricePerKg: pricePerKg,
          totalPrice: itemPrice
        };
        
        setItems(prev => [...prev, newItem]);
      };

      const handleRemoveItem = (id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      };

      useEffect(() => {
        let area = 0; 
        if (shape === 'angle') {
          area = (dimensions.A + dimensions.B - dimensions.t1) * dimensions.t1;
        } else if (shape === 'hbeam' || shape === 'channel') {
          area = (2 * dimensions.W * dimensions.t2) + ((dimensions.H - 2 * dimensions.t2) * dimensions.t1);
        } else if (shape === 'plate') {
          area = dimensions.W * dimensions.t1;
        }

        const volume = area * dimensions.L;
        const calculatedWeight = (volume * densities[material]) / 1000000;
        
        setWeight(calculatedWeight > 0 ? calculatedWeight : 0);
      }, [dimensions, material, shape]);

      const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
      const totalPriceSum = items.reduce((sum, item) => sum + item.totalPrice, 0); // 총 금액 다 더하기냥!

      return (
        <div className="min-h-screen bg-gray-100 p-4 md:p-8 flex items-center justify-center font-sans text-gray-800">
          <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 md:p-10 border-t-8 border-orange-400">
            
            <div className="text-center mb-8">
              <h1 className="text-2xl md:text-3xl font-bold text-gray-800 mb-2">🐾 냥이의 철강 무게 계산기 🐾</h1>
              <p className="text-gray-500 text-sm md:text-base">치수를 입력하면 냥이가 무게를 계산해준다냥!</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
              <div>
                <label className="block text-sm font-bold mb-2 text-gray-700">재질 (Material) 고르기냥!</label>
                <select value={material} onChange={(e) => setMaterial(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 outline-none">
                  <option value="ss400">SS400 (일반철강 - 비중 7.85)</option>
                  <option value="sus304">SUS304 (스텐 - 비중 7.93)</option>
                </select>
              </div>
              <div>
                <label className="block text-sm font-bold mb-2 text-gray-700">모양 (Shape) 고르기냥!</label>
                <select value={shape} onChange={(e) => setShape(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 outline-none">
                  <option value="plate">판재 (Plate)</option>
                  <option value="angle">앵글 (Angle)</option>
                  <option value="hbeam">H빔 (H-Beam)</option>
                  <option value="channel">잔넬 (Channel)</option>
                </select>
              </div>
            </div>

            <div className="bg-orange-50 p-6 rounded-xl border border-orange-100 mb-8 relative">
              <h2 className="text-lg font-bold mb-4 text-orange-800 border-b border-orange-200 pb-2">📏 치수 입력 (단위: mm)</h2>
              
              <div className="grid grid-cols-2 gap-4">
                {shape === 'plate' && (
                  <>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">W (폭/가로)</label>
                      <input type="number" name="W" value={dimensions.W} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">t (두께)</label>
                      <input type="number" name="t1" value={dimensions.t1} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                  </>
                )}

                {shape === 'angle' && (
                  <>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">A (가로)</label>
                      <input type="number" name="A" value={dimensions.A} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">B (세로)</label>
                      <input type="number" name="B" value={dimensions.B} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">t (두께)</label>
                      <input type="number" name="t1" value={dimensions.t1} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                  </>
                )}

                {(shape === 'hbeam' || shape === 'channel') && (
                  <>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">H (높이)</label>
                      <input type="number" name="H" value={dimensions.H} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">B (폭)</label>
                      <input type="number" name="W" value={dimensions.W} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">t1 (웨브 두께)</label>
                      <input type="number" name="t1" value={dimensions.t1} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1 text-gray-600">t2 (플랜지 두께)</label>
                      <input type="number" name="t2" value={dimensions.t2} onChange={handleInputChange} className="w-full p-2 border rounded outline-none" />
                    </div>
                  </>
                )}

                <div className="col-span-2 mt-2">
                  <label className="block text-sm font-bold mb-1 text-gray-800">L (전체 길이, mm)</label>
                  <input type="number" name="L" value={dimensions.L} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg outline-none font-bold text-lg mb-2" />
                  <p className="text-xs text-gray-500 mb-4">※ 1미터(1m)는 1000mm 다냥!</p>

                  <label className="block text-sm font-bold mb-1 text-gray-800">단가 (KG당 금액, 원)</label>
                  <div className="flex gap-4 items-center">
                    <input type="number" value={pricePerKg} onChange={(e) => setPricePerKg(parseFloat(e.target.value) || 0)} className="w-full p-3 border border-gray-300 rounded-lg outline-none font-bold text-lg text-blue-700 bg-blue-50" placeholder="예: 1200" />
                    <button onClick={handleAddItem} className="text-red-500 hover:text-red-600 hover:bg-red-50 font-light text-5xl flex items-center justify-center w-12 h-12 transition-colors rounded-full shrink-0" title="목록에 추가하기">
                      +
                    </button>
                  </div>
                  <p className="text-xs text-blue-500 mt-1">※ 단가를 넣고 +를 누르면 총 금액도 같이 계산된다냥!</p>
                </div>
              </div>
            </div>

            {items.length > 0 && (
              <div className="bg-white p-5 rounded-xl border border-gray-200 mb-8 shadow-sm">
                <h2 className="text-base font-bold mb-3 text-gray-800 border-b border-gray-200 pb-2">📋 계산 목록</h2>
                <ul className="space-y-2 mb-4 max-h-48 overflow-y-auto pr-2">
                  {items.map((item, index) => (
                    <li key={item.id} className="flex justify-between items-center bg-gray-50 p-2 rounded border border-gray-100">
                      <div className="text-sm flex flex-col md:flex-row md:items-center">
                        <div>
                          <span className="font-bold text-orange-600 mr-2">#{index + 1}</span>
                          <span className="font-bold mr-2 text-gray-700">[{item.material}]</span>
                          <span className="font-bold mr-2 text-gray-800">{item.shapeName}</span>
                        </div>
                        <span className="text-gray-500 text-xs">({item.dimText})</span>
                      </div>
                      <div className="flex items-center gap-3 shrink-0 ml-2">
                        <div className="text-right">
                          <div className="font-bold text-gray-800">{item.weight.toFixed(2)} kg</div>
                          {item.totalPrice > 0 && <div className="text-xs font-bold text-blue-600">{Math.round(item.totalPrice).toLocaleString()} 원</div>}
                        </div>
                        <button onClick={() => handleRemoveItem(item.id)} className="text-gray-400 hover:text-red-500 transition-colors" title="삭제">✕</button>
                      </div>
                    </li>
                  ))}
                </ul>
                
                <div className="flex flex-col gap-2 bg-orange-100 p-4 rounded-lg border border-orange-200">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-orange-900">총 무게 합계</span>
                    <span className="text-xl font-black text-orange-600">{totalWeight.toFixed(2)} kg</span>
                  </div>
                  <div className="flex justify-between items-center border-t border-orange-200 pt-2 mt-1">
                    <span className="font-bold text-orange-900">총 금액 합계</span>
                    <span className="text-xl font-black text-blue-700">{Math.round(totalPriceSum).toLocaleString()} 원</span>
                  </div>
                </div>
              </div>
            )}

            <div className="bg-[#1e293b] text-white rounded-xl p-8 text-center shadow-inner">
              <p className="text-sm text-gray-400 mb-2 font-bold tracking-wider">현재 입력된 예상 무게</p>
              <div className="flex items-baseline justify-center gap-2">
                <span className="text-5xl md:text-6xl font-black text-orange-400">{weight.toFixed(2)}</span>
                <span className="text-2xl font-bold text-gray-300">kg</span>
              </div>
              
              {/* 단가를 입력했을 때만 실시간 금액을 보여주는 마법 코드다냥! */}
              {pricePerKg > 0 && (
                <div className="mt-6 pt-5 border-t border-gray-700">
                  <p className="text-sm text-gray-400 mb-2 font-bold tracking-wider">현재 입력된 예상 금액</p>
                  <div className="flex items-baseline justify-center gap-2">
                    <span className="text-4xl md:text-5xl font-black text-blue-400">
                      {Math.round(weight * pricePerKg).toLocaleString()}
                    </span>
                    <span className="text-xl font-bold text-gray-300">원</span>
                  </div>
                </div>
              )}

              <p className="text-xs text-gray-500 mt-6">* 냥이의 안내: R(라운드) 값이 제외된 단순 단면적 계산이므로 실제 규격표와 미세한 오차가 있을 수 있다냥!</p>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
